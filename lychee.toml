# lychee configuration for the DP-700 Study Guide.
#
# CI policy:
# - Verify every relative .md / image / file link resolves to an existing path
# - Skip external HTTP/HTTPS URLs (their health is verified manually during
#   PR review; flaky external endpoints would otherwise constantly fail CI)
# - Skip mailto:, tel:, ftp:, data:, javascript:

# Skip external URLs and other non-file schemes
exclude = [
  "^https?://",
  "^mailto:",
  "^tel:",
  "^ftp://",
  "^data:",
  "^javascript:",

  # Task 1 scaffold: the 11 section index files linked from
  # certification/dp-700-overview.md don't exist yet — each lands with its
  # own content task (Tasks 2-11ish). Remove this exclusion in Task 13 once
  # every section index has been written.
  "certification/0[1-9]-",
  "certification/1[01]-",

  # TODO remove in Task 5 (cheat sheets PR): cheat-sheets.md doesn't exist
  # yet — section 11 links to it in anticipation of that PR.
  "certification/resources/cheat-sheets/",
]

# Don't check links inside fenced code blocks (SQL, Python, JSON, etc.)
include_verbatim = false

# Cache to speed up repeated checks
cache = true
max_cache_age = "1d"

# Exclude paths we don't author
exclude_path = [
  ".obsidian/",
  "node_modules/",
  ".git/",
  ".reference/",
  # RELEASE_NOTES.md uses GitHub release-page-relative paths (../../README.md)
  # that resolve correctly when rendered on the release page but not from the
  # file's location in the repo root. It is a transient artifact, not a
  # canonical file, so we exclude it from link checks.
  "RELEASE_NOTES.md",
]
